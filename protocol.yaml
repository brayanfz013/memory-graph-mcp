# Perfector Cross-Platform Protocol
# Version: 1.0.0
# Purpose: Ensures Claude Code, Copilot, and Codex interact with memory-graph
# using the same contract — same tools, same startup sequence, same storage rules.

protocol:
  version: "1.1.0"
  name: "perfector-protocol"
  description: >
    Unified knowledge protocol for multi-agent AI workspaces.
    All platforms MUST follow this contract to maintain consistent
    institutional knowledge across Claude Code, GitHub Copilot, and OpenAI Codex.

# ── Canonical Entity ──────────────────────────────────────────

canonical_entity:
  id_pattern: "{node_type}.{slug}"  # e.g. "Solution.duckdb-lock-retry"
  id_function: "make_canonical_id(node_type, title)"
  projections:
    vectorial: "memory_store → 384-dim embedding, cosine similarity"
    graph: "kg_add_node → PageRank-ranked knowledge graph"
    documental: "wiki_ingest → long-form curated wiki page"
    compressed: "tldr_32 / brief_96 / summary_256 → multi-level compression"

# ── Lifecycle States ──────────────────────────────────────────

lifecycle:
  states:
    - draft        # Initial state, auto-created by memory_record_finding
    - canonical    # Validated knowledge, promoted after reuse_count >= 3
    - superseded   # Replaced by newer canonical node
  transitions:
    - from: draft
      to: canonical
      trigger: "reuse_count >= PROMOTION_REUSE_THRESHOLD (3)"
      action: "maybe_promote() auto-triggers"
    - from: canonical
      to: superseded
      trigger: "manual kg_promote() or replacement node created"
      action: "SUPERSEDES edge added to replacement"

# ── Mandatory Startup Sequence ────────────────────────────────

startup_sequence:
  description: >
    Every agent interaction MUST execute these steps before any work.
    Order matters. Do not skip.
  steps:
    - order: 1
      tool: "memory_recall"
      args:
        query: "<task description>"
        top_k: 3
      purpose: "Check if this problem was already solved"

    - order: 2
      tool: "kg_query"
      args:
        query: "<relevant keywords>"
      purpose: "Find related decisions and context by PageRank"

    - order: 3
      tool: "cache_check"
      args:
        tool_name: "<tool being called>"
        args_hash: "<hash of arguments>"
      purpose: "Avoid re-running expensive queries"

  bootstrap_hint: >
    If memory_recall and kg_query return empty results (new workspace),
    run wiki_bootstrap() to auto-populate the wiki with workspace structure,
    READMEs, code summaries, and configuration analysis.

# ── Mandatory Post-Task Sequence ──────────────────────────────

post_task_sequence:
  description: >
    After completing ANY task, store the solution. This is the
    highest-impact habit — without it, the next agent re-solves everything.
  steps:
    - order: 1
      tool: "memory_record_finding"
      args:
        finding_type: "solution|decision|insight|error_fix"
        title: "<concise title>"
        content: "<what was done and why>"
        related_files: ["<files touched>"]
        tags: ["<relevant tags>"]
      purpose: "Persist the solution in both vector store and knowledge graph"

    - order: 2
      tool: "kg_add_edge"
      args:
        from_id: "<new node_id>"
        to_id: "<related node_id>"
        rel_type: "SOLVES|DEPENDS_ON|RELATED_TO|SUPERSEDES"
      purpose: "Connect to existing knowledge"

    - order: 3
      tool: "kg_compute_pagerank"
      purpose: "Update influence rankings"

# ── Compression Levels ────────────────────────────────────────

compression:
  levels:
    - name: "tldr_32"
      max_words: 32
      use_case: "Tool results, list items, search snippets"
    - name: "brief_96"
      max_words: 96
      use_case: "Context summaries, decision briefs"
    - name: "summary_256"
      max_words: 256
      use_case: "Full explanations, wiki page previews"
    - name: "full"
      max_words: null
      use_case: "Wiki pages, complete documentation"

  auto_generation: >
    tldr_32 and brief_96 are auto-generated by memory_record_finding().
    summary_256 can be set explicitly via kg_add_node().
    Full content lives in wiki pages via wiki_crystallize().

# ── Platform-Specific Paths ──────────────────────────────────

platforms:
  claude_code:
    instruction_file: "CLAUDE.md"
    skill_path: ".claude/skills/memory-intelligence/SKILL.md"
    agent_path: ".claude/agents/"
    startup: "Auto-reads CLAUDE.md → executes startup_sequence"

  github_copilot:
    instruction_file: ".github/copilot-instructions.md"
    skill_path: ".claude/skills/memory-intelligence/SKILL.md"
    startup: "Reads copilot-instructions.md → executes startup_sequence"

  openai_codex:
    instruction_file: "AGENTS.md"
    skill_path: ".claude/skills/memory-intelligence/SKILL.md"
    startup: "Reads AGENTS.md → executes startup_sequence"

# ── Tool Catalog ──────────────────────────────────────────────

tools:
  # Vector memory
  - name: memory_store
    category: vector
    description: "Embed and store a memory"
  - name: memory_recall
    category: vector
    description: "Semantic similarity search"

  # Knowledge graph
  - name: kg_add_node
    category: graph
    description: "Add/update a node (with canonical dedup)"
  - name: kg_add_edge
    category: graph
    description: "Add a directed edge"
  - name: kg_query
    category: graph
    description: "Search by text + PageRank"
  - name: kg_compute_pagerank
    category: graph
    description: "Recompute influence rankings"
  - name: kg_promote
    category: graph
    description: "Transition node lifecycle status"
  - name: kg_resolve
    category: graph
    description: "Look up node by canonical_id"
  - name: kg_neighbors
    category: graph
    description: "Get immediate neighbors"
  - name: kg_path
    category: graph
    description: "Find shortest path between nodes"
  - name: kg_influential
    category: graph
    description: "Top nodes by PageRank"

  # Wiki
  - name: wiki_ingest
    category: wiki
    description: "Create/update a wiki page"
  - name: wiki_crystallize
    category: wiki
    description: "Auto-generate wiki from KG node"
  - name: wiki_query
    category: wiki
    description: "Search wiki pages"
  - name: wiki_lint
    category: wiki
    description: "Audit wiki health"
  - name: wiki_bootstrap
    category: wiki
    description: "Auto-populate wiki from workspace structure (READMEs, code, configs)"

  # Collective
  - name: collective_store
    category: collective
    description: "Store shared state with TTL"
  - name: collective_get
    category: collective
    description: "Retrieve shared state"
  - name: collective_list
    category: collective
    description: "List collective entries"
  - name: collective_cleanup
    category: collective
    description: "Remove expired entries"

  # Cache
  - name: cache_check
    category: cache
    description: "Check for cached tool result"
  - name: cache_store
    category: cache
    description: "Cache a tool result"

  # Intelligence
  - name: memory_report
    category: intelligence
    description: "Full health report"
  - name: memory_consolidate
    category: intelligence
    description: "Clean up expired data"
  - name: memory_record_finding
    category: intelligence
    description: "Record finding (vector + graph + canonical)"
  - name: memory_stats
    category: intelligence
    description: "Table counts and sizes"

# ── Storage Rules ─────────────────────────────────────────────

storage_rules:
  never_store:
    - "Secrets, API keys, tokens"
    - "PII (names, emails, addresses, cédulas)"
    - "Raw data dumps (>1KB)"
    - "Binary content"
  always_store:
    - "Error fixes (finding_type: error_fix)"
    - "Architecture decisions (finding_type: decision)"
    - "Solutions that took >5 minutes to derive"
    - "Cross-session context that would be lost"
